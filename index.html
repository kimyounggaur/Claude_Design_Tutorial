<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Design 배우기</title>
<style>
  :root{
    --bg:#F4F2EC; --surface:#FBFAF6; --surface-2:#F0EDE4;
    --ink:#1F1E1B; --ink-soft:#5C584F; --ink-faint:#8B867A;
    --line:#E3DECF; --line-strong:#D6CFBC;
    --accent:#CC7A52; --accent-deep:#B5623B; --accent-soft:#F3E2D6;
    --new:#B5623B;
    --shadow:0 1px 2px rgba(31,30,27,.04), 0 6px 22px rgba(31,30,27,.06);
    --shadow-lg:0 10px 40px rgba(31,30,27,.16);
    --radius:16px; --radius-sm:10px;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* ---------- Header ---------- */
  header.site{padding:38px 24px 10px;max-width:1120px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:11px;font-weight:600;letter-spacing:.2px;color:var(--ink-soft);font-size:14px}
  .brand .dot{width:22px;height:22px;border-radius:6px;background:var(--accent);
    display:grid;place-items:center;color:#fff;font-size:13px;box-shadow:var(--shadow)}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(30px,5vw,46px);
    line-height:1.1;letter-spacing:-.5px;margin:20px 0 12px}
  .lede{font-size:clamp(15px,2.2vw,18px);color:var(--ink-soft);max-width:640px}
  .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--surface);
    border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink-soft)}
  .pill b{color:var(--ink);font-weight:600}
  .pill .live{width:7px;height:7px;border-radius:50%;background:#3D8C6F;box-shadow:0 0 0 3px rgba(61,140,111,.18)}

  /* ---------- Stats ---------- */
  .stats{max-width:1120px;margin:26px auto 0;padding:0 24px;
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow)}
  .stat .n{font-family:var(--serif);font-size:30px;line-height:1;color:var(--accent-deep)}
  .stat .l{font-size:12.5px;color:var(--ink-faint);margin-top:7px;letter-spacing:.2px}
  .stat .bar{height:6px;border-radius:99px;background:var(--surface-2);margin-top:11px;overflow:hidden}
  .stat .bar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .6s ease}

  /* ---------- Controls ---------- */
  .controls{max-width:1120px;margin:30px auto 0;padding:0 24px;
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
  .search{position:relative;flex:1;min-width:230px}
  .search input{width:100%;border:1px solid var(--line-strong);background:var(--surface);
    border-radius:999px;padding:12px 16px 12px 42px;font-size:14px;font-family:var(--sans);color:var(--ink);outline:none;transition:.15s}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.5}
  .filter-note{font-size:13px;color:var(--ink-faint)}

  .tabs{max-width:1120px;margin:16px auto 0;padding:0 24px;display:flex;flex-wrap:wrap;gap:9px}
  .tab{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);
    border-radius:999px;padding:8px 15px;font-size:13.5px;font-family:var(--sans);cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
  .tab:hover{border-color:var(--accent);color:var(--ink)}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab .ic{opacity:.65;font-size:12px}
  .tab.active .ic{opacity:1}
  .tab .cnt{font-size:11px;background:var(--surface-2);color:var(--ink-faint);border-radius:99px;padding:1px 7px}
  .tab.active .cnt{background:rgba(255,255,255,.2);color:#fff}

  /* ---------- Grid ---------- */
  .grid{max-width:1120px;margin:26px auto 70px;padding:0 24px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;cursor:pointer;position:relative;display:flex;flex-direction:column;
    box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease,border-color .18s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--line-strong)}
  .card.done{background:linear-gradient(var(--surface),var(--surface))}
  .card.done::after{content:"✓ 완료";position:absolute;top:16px;right:16px;font-size:11px;
    color:#3D8C6F;background:rgba(61,140,111,.1);border:1px solid rgba(61,140,111,.25);
    border-radius:99px;padding:3px 9px;font-weight:600}
  .c-top{display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .lvl{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;color:#fff;letter-spacing:.3px}
  .cat-tag{font-size:11.5px;color:var(--ink-faint);display:inline-flex;align-items:center;gap:5px}
  .badge-new{font-size:10px;font-weight:700;letter-spacing:.5px;color:#fff;background:var(--new);
    border-radius:5px;padding:2px 6px}
  .card h3{font-family:var(--serif);font-size:19.5px;line-height:1.25;letter-spacing:-.3px;margin-bottom:9px;padding-right:8px}
  .card p{font-size:13.5px;color:var(--ink-soft);flex:1}
  .c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;
    padding-top:14px;border-top:1px solid var(--line)}
  .c-foot .date{font-size:11.5px;color:var(--ink-faint)}
  .c-foot .go{font-size:12.5px;color:var(--accent-deep);font-weight:600;display:inline-flex;gap:5px;align-items:center}

  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--ink-faint)}
  .empty .big{font-size:34px;margin-bottom:10px;opacity:.5}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(31,30,27,.42);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;padding:5vh 18px;z-index:50;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:20px;max-width:680px;width:100%;
    box-shadow:var(--shadow-lg);border:1px solid var(--line);animation:pop .22s ease;margin:auto 0}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .m-head{padding:28px 30px 22px;border-bottom:1px solid var(--line);position:relative}
  .m-close{position:absolute;top:20px;right:22px;width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line-strong);background:var(--surface);cursor:pointer;font-size:17px;
    color:var(--ink-soft);display:grid;place-items:center;transition:.15s}
  .m-close:hover{background:var(--surface-2);color:var(--ink)}
  .m-tags{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .modal h2{font-family:var(--serif);font-size:26px;line-height:1.2;letter-spacing:-.4px;padding-right:30px}
  .m-sum{color:var(--ink-soft);font-size:15px;margin-top:12px}
  .m-body{padding:24px 30px 8px}
  .sect{margin-bottom:24px}
  .sect h4{font-size:12.5px;letter-spacing:1px;text-transform:uppercase;color:var(--accent-deep);
    font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
  .learn-list{list-style:none;display:flex;flex-direction:column;gap:9px}
  .learn-list li{font-size:14.5px;color:var(--ink);padding-left:26px;position:relative}
  .learn-list li::before{content:"";position:absolute;left:4px;top:9px;width:7px;height:7px;
    border-radius:50%;background:var(--accent)}
  .steps{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:11px}
  .steps li{font-size:14.5px;color:var(--ink);padding-left:40px;position:relative;line-height:1.55}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:0;
    width:26px;height:26px;border-radius:8px;background:var(--ink);color:#fff;
    font-size:13px;font-weight:600;display:grid;place-items:center}
  .tips{background:var(--accent-soft);border:1px solid #ECCFBC;border-radius:var(--radius-sm);padding:16px 18px}
  .tips ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .tips li{font-size:13.5px;color:#7A4A2E;padding-left:22px;position:relative}
  .tips li::before{content:"💡";position:absolute;left:0;top:0;font-size:13px}

  /* practice */
  .practice{background:#F1F4EF;border:1px solid #D8E2D2;border-radius:var(--radius-sm);padding:18px 20px}
  .practice .goal{font-size:14px;color:#33513F;margin-bottom:15px;line-height:1.55}
  .practice .goal b{color:#264532}
  .mission{list-style:none;counter-reset:m;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .mission li{font-size:14px;color:var(--ink);padding-left:34px;position:relative;line-height:1.5}
  .mission li::before{counter-increment:m;content:counter(m);position:absolute;left:0;top:1px;
    width:23px;height:23px;border-radius:50%;background:#3D8C6F;color:#fff;
    font-size:12px;font-weight:600;display:grid;place-items:center}
  .pl-label{font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;color:#5C7A66;
    font-weight:700;margin:4px 0 9px}
  .prompt{background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;
    padding:12px 13px;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
  .prompt .txt{flex:1;font-size:13px;color:var(--ink);line-height:1.5;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;word-break:break-word}
  .copy-btn{flex-shrink:0;border:1px solid var(--line-strong);background:var(--surface-2);
    border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--ink-soft);
    cursor:pointer;font-family:var(--sans);transition:.15s;white-space:nowrap}
  .copy-btn:hover{border-color:#3D8C6F;color:#3D8C6F}
  .copy-btn.copied{background:#3D8C6F;color:#fff;border-color:#3D8C6F}
  .m-foot{padding:18px 30px 26px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .src a{font-size:12.5px;color:var(--ink-faint);text-decoration:none;border-bottom:1px dotted var(--line-strong)}
  .src a:hover{color:var(--accent-deep)}
  .btn{border:none;border-radius:999px;padding:11px 20px;font-size:14px;font-weight:600;
    font-family:var(--sans);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn-done{background:var(--ink);color:#fff}
  .btn-done:hover{background:#000}
  .btn-done.is-done{background:#3D8C6F}
  .btn-launch{background:var(--accent);color:#fff;text-decoration:none}
  .btn-launch:hover{background:var(--accent-deep)}

  footer{max-width:1120px;margin:0 auto;padding:24px 24px 50px;color:var(--ink-faint);font-size:12.5px;
    border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between}
  footer a{color:var(--ink-soft)}

  @media(max-width:680px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .grid{grid-template-columns:1fr}
    header.site{padding-top:28px}
    .m-head,.m-body,.m-foot{padding-left:20px;padding-right:20px}
  }
</style>
</head>
<body>

<header class="site">
  <div class="brand"><span class="dot">✦</span><span id="brandText">Claude Design · 학습 가이드</span></div>
  <h1 id="title">Claude Design 배우기</h1>
  <p class="lede" id="subtitle"></p>
  <div class="meta-row">
    <span class="pill"><span class="live"></span>자동 업데이트 · 최근 갱신 <b id="updated">—</b></span>
    <span class="pill">강의 <b id="totalPill">0</b>개</span>
    <span class="pill">버전 <b id="verPill">—</b></span>
  </div>
</header>

<section class="stats">
  <div class="stat"><div class="n" id="sTotal">0</div><div class="l">전체 강의</div></div>
  <div class="stat"><div class="n" id="sNew">0</div><div class="l">새 기능 (NEW)</div></div>
  <div class="stat"><div class="n" id="sCat">0</div><div class="l">학습 카테고리</div></div>
  <div class="stat">
    <div class="n"><span id="sDonePct">0</span>%</div><div class="l">내 학습 진행도</div>
    <div class="bar"><i id="progBar" style="width:0%"></i></div>
  </div>
</section>

<div class="controls">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="text" placeholder="기능·키워드로 검색 (예: 디자인 시스템, 캔버스, design-sync)" />
  </div>
  <span class="filter-note" id="resultCount"></span>
</div>

<div class="tabs" id="tabs"></div>

<main class="grid" id="grid"></main>

<footer>
  <span>Claude Design 학습 사이트 · 콘텐츠는 자동 업데이트로 갱신됩니다</span>
  <span id="footSources"></span>
</footer>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="m-head">
      <button class="m-close" id="mClose" aria-label="닫기">✕</button>
      <div class="m-tags" id="mTags"></div>
      <h2 id="mTitle"></h2>
      <p class="m-sum" id="mSum"></p>
    </div>
    <div class="m-body">
      <div class="sect">
        <h4>📚 이걸 배웁니다</h4>
        <ul class="learn-list" id="mLearn"></ul>
      </div>
      <div class="sect">
        <h4>🪜 따라하기</h4>
        <ol class="steps" id="mSteps"></ol>
      </div>
      <div class="sect" id="mPracticeSect">
        <h4>🎯 직접 실습하기</h4>
        <div class="practice">
          <div class="goal" id="mGoal"></div>
          <ol class="mission" id="mMission"></ol>
          <div class="pl-label">복사해서 Claude Design에 붙여넣기</div>
          <div id="mPrompts"></div>
        </div>
      </div>
      <div class="sect">
        <div class="tips"><ul id="mTips"></ul></div>
      </div>
    </div>
    <div class="m-foot">
      <span class="src" id="mSrc"></span>
      <div style="display:flex;gap:10px">
        <a class="btn btn-launch" id="mLaunch" href="https://claude.ai/design" target="_blank" rel="noopener">Claude Design 열기 ↗</a>
        <button class="btn btn-done" id="mDone">학습 완료로 표시</button>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
(function(){
  var D = window.CLAUDE_DESIGN_DATA;
  if(!D){ document.getElementById('grid').innerHTML='<div class="empty"><div class="big">⚠️</div>data.js 를 불러오지 못했습니다. index.html 과 같은 폴더에 data.js 가 있는지 확인하세요.</div>'; return; }
  var META=D.COURSE_META, CATS=D.CATEGORIES, LEVELS=D.LEVELS, LESSONS=D.LESSONS;

  /* progress (localStorage, in-memory fallback) */
  var KEY="claudeDesignProgress.v1", mem={};
  function loadDone(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return mem; } }
  function saveDone(o){ mem=o; try{ localStorage.setItem(KEY,JSON.stringify(o)); }catch(e){} }
  var done=loadDone();

  var state={cat:"all", q:""};

  /* header */
  document.getElementById('title').textContent=META.title;
  document.getElementById('subtitle').textContent=META.subtitle;
  document.getElementById('updated').textContent=META.lastUpdated;
  document.getElementById('verPill').textContent=META.version;
  document.getElementById('totalPill').textContent=LESSONS.length;
  document.getElementById('footSources').innerHTML=(META.sources||[]).map(function(s){
    return '<a href="'+s.url+'" target="_blank" rel="noopener">'+s.label+'</a>';}).join(' · ');

  function catLabel(id){var c=CATS.find(function(x){return x.id===id});return c?c.label:id;}
  function catIcon(id){var c=CATS.find(function(x){return x.id===id});return c?c.icon:"◆";}

  /* stats */
  function renderStats(){
    document.getElementById('sTotal').textContent=LESSONS.length;
    document.getElementById('sNew').textContent=LESSONS.filter(function(l){return l.isNew}).length;
    document.getElementById('sCat').textContent=CATS.length-1;
    var d=LESSONS.filter(function(l){return done[l.id]}).length;
    var pct=LESSONS.length?Math.round(d/LESSONS.length*100):0;
    document.getElementById('sDonePct').textContent=pct;
    document.getElementById('progBar').style.width=pct+"%";
  }

  /* tabs */
  function renderTabs(){
    var t=document.getElementById('tabs'); t.innerHTML="";
    CATS.forEach(function(c){
      var n=c.id==="all"?LESSONS.length:LESSONS.filter(function(l){return l.category===c.id}).length;
      var b=document.createElement('button');
      b.className="tab"+(state.cat===c.id?" active":"");
      b.innerHTML='<span class="ic">'+c.icon+'</span>'+c.label+'<span class="cnt">'+n+'</span>';
      b.onclick=function(){state.cat=c.id;render();};
      t.appendChild(b);
    });
  }

  /* cards */
  function filtered(){
    var q=state.q.trim().toLowerCase();
    return LESSONS.filter(function(l){
      if(state.cat!=="all" && l.category!==state.cat) return false;
      if(!q) return true;
      var hay=(l.title+" "+l.summary+" "+catLabel(l.category)+" "+(l.learn||[]).join(" ")).toLowerCase();
      return hay.indexOf(q)>=0;
    });
  }
  function render(){
    renderTabs(); renderStats();
    var g=document.getElementById('grid'); g.innerHTML="";
    var list=filtered();
    document.getElementById('resultCount').textContent=list.length+"개 강의";
    if(!list.length){
      g.innerHTML='<div class="empty"><div class="big">🔍</div>검색 결과가 없습니다. 다른 키워드를 시도해 보세요.</div>';return;
    }
    list.forEach(function(l){
      var lv=LEVELS[l.level]||{label:l.level,color:"#888"};
      var card=document.createElement('article');
      card.className="card"+(done[l.id]?" done":"");
      card.innerHTML=
        '<div class="c-top">'+
          '<span class="lvl" style="background:'+lv.color+'">'+lv.label+'</span>'+
          '<span class="cat-tag">'+catIcon(l.category)+' '+catLabel(l.category)+'</span>'+
          (l.isNew?'<span class="badge-new">NEW</span>':'')+
        '</div>'+
        '<h3>'+l.title+'</h3>'+
        '<p>'+l.summary+'</p>'+
        '<div class="c-foot"><span class="date">'+l.date+'</span>'+
          '<span class="go">자세히 보기 →</span></div>';
      card.onclick=function(){openModal(l);};
      g.appendChild(card);
    });
  }

  /* modal */
  var current=null;
  function openModal(l){
    current=l;
    var lv=LEVELS[l.level]||{label:l.level,color:"#888"};
    document.getElementById('mTags').innerHTML=
      '<span class="lvl" style="background:'+lv.color+'">'+lv.label+'</span>'+
      '<span class="cat-tag">'+catIcon(l.category)+' '+catLabel(l.category)+'</span>'+
      (l.isNew?'<span class="badge-new">NEW</span>':'')+
      '<span class="cat-tag">· '+l.date+'</span>';
    document.getElementById('mTitle').textContent=l.title;
    document.getElementById('mSum').textContent=l.summary;
    document.getElementById('mLearn').innerHTML=(l.learn||[]).map(function(x){return '<li>'+x+'</li>'}).join('');
    document.getElementById('mSteps').innerHTML=(l.steps||[]).map(function(x){return '<li>'+x+'</li>'}).join('');
    document.getElementById('mTips').innerHTML=(l.tips||[]).map(function(x){return '<li>'+x+'</li>'}).join('');
    renderPractice(l);
    document.getElementById('mSrc').innerHTML= l.source?('출처: <a href="'+l.source.url+'" target="_blank" rel="noopener">'+l.source.title+'</a>'):'';
    updateDoneBtn();
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow="hidden";
  }
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function renderPractice(l){
    var sect=document.getElementById('mPracticeSect');
    var p=l.practice;
    if(!p){ sect.style.display="none"; return; }
    sect.style.display="";
    document.getElementById('mGoal').innerHTML="<b>목표 ·</b> "+esc(p.goal||"");
    document.getElementById('mMission').innerHTML=(p.mission||[]).map(function(x){return '<li>'+esc(x)+'</li>';}).join('');
    var wrap=document.getElementById('mPrompts');
    wrap.innerHTML="";
    (p.prompts||[]).forEach(function(txt){
      var row=document.createElement('div'); row.className="prompt";
      var t=document.createElement('div'); t.className="txt"; t.textContent=txt;
      var b=document.createElement('button'); b.className="copy-btn"; b.textContent="복사";
      b.onclick=function(){ copyText(txt,b); };
      row.appendChild(t); row.appendChild(b); wrap.appendChild(row);
    });
  }
  function copyText(txt,btn){
    function ok(){ btn.textContent="✓ 복사됨"; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent="복사"; btn.classList.remove('copied'); },1500); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(ok).catch(function(){ fallbackCopy(txt,ok); });
    } else { fallbackCopy(txt,ok); }
  }
  function fallbackCopy(txt,ok){
    var ta=document.createElement('textarea'); ta.value=txt;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); ok(); }catch(e){} document.body.removeChild(ta);
  }
  function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow="";}
  function updateDoneBtn(){
    var b=document.getElementById('mDone');
    if(done[current.id]){b.textContent="✓ 학습 완료됨";b.classList.add('is-done');}
    else{b.textContent="학습 완료로 표시";b.classList.remove('is-done');}
  }
  document.getElementById('mDone').onclick=function(){
    if(done[current.id]) delete done[current.id]; else done[current.id]=true;
    saveDone(done); updateDoneBtn(); render();
  };
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=function(e){if(e.target===this)closeModal();};
  document.addEventListener('keydown',function(e){if(e.key==="Escape")closeModal();});

  document.getElementById('search').addEventListener('input',function(e){state.q=e.target.value;render();});

  render();
})();
</script>
</body>
</html>
